# Money Tracker Web App - Root domain
server {
    listen 80;
    server_name almoneytracker.live www.almoneytracker.live;

    # React SPA - static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # SPA fallback - serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Laravel API proxy
    location /api {
        # Remove /api prefix when passing to Laravel
        # Laravel routes already include /api in routes/api.php
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        include fastcgi_params;
        
        # Forward headers
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    }

    # Static assets caching
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# n8n subdomain - proxy to n8n service
server {
    listen 80;
    server_name n8n.almoneytracker.live;

    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        
        # WebSocket support for n8n
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Timeouts for long-running n8n operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# Default - reject unknown hosts
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
