# Money Tracker Web App - Root domain
server {
    listen 80;
    server_name almoneytracker.live www.almoneytracker.live;

    # React SPA - static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # SPA fallback - serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # NewUI SPA at /newui/
    location /newui/ {
        alias /usr/share/nginx/html/newui/;
        try_files $uri $uri/ /newui/index.html;
    }

    # Laravel API proxy
    # Laravel routes/api.php auto-prefixes /api, so /api/health → Route::get('/health', ...)
    location /api/ {
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        include fastcgi_params;

        # Forward headers
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;

        # Increase timeouts for slow Google Sheets API calls
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 30s;
        fastcgi_connect_timeout 10s;

        # Return JSON error when PHP-FPM is down/unresponsive
        error_page 502 503 504 =503 @api_error;
    }

    # JSON error response for API upstream failures
    location @api_error {
        default_type application/json;
        return 503 '{"error":"service_unavailable","message":"API is starting up or temporarily unavailable. Please retry in 30 seconds."}';
    }

    # Also match /api without trailing slash
    location = /api {
        return 301 /api/;
    }

    # Static assets caching
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# n8n subdomain - proxy to n8n service
server {
    listen 80;
    server_name n8n.almoneytracker.live;

    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        
        # WebSocket support for n8n
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Timeouts for long-running n8n operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# Default - reject unknown hosts
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
