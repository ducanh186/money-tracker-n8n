services:
  # Reverse Proxy - routes traffic to app/n8n based on hostname
  nginx:
    image: nginx:alpine
    container_name: almoney_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - web_static:/usr/share/nginx/html:ro
    depends_on:
      - api
      - n8n
    networks:
      - almoney_network

  # Laravel API (PHP-FPM)
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: almoney_api
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://almoneytracker.live
      - LOG_CHANNEL=stderr
    env_file:
      - ../api/.env
    volumes:
      - ../api/.env:/var/www/.env:ro
      - ../api/storage:/var/www/storage
      - ../secrets/google-service-account.json:/var/www/storage/app/gsheets.json:ro
    networks:
      - almoney_network

  # n8n Workflow Automation
  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    container_name: almoney_n8n
    ports:
      - "127.0.0.1:5678:5678"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=n8n.almoneytracker.live
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://n8n.almoneytracker.live/
      - N8N_EDITOR_BASE_URL=https://n8n.almoneytracker.live/
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Bangkok}
      - TZ=${GENERIC_TIMEZONE:-Asia/Bangkok}
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n/local-files:/files
    networks:
      - almoney_network

  # Cloudflare Tunnel - exposes nginx to internet securely
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: almoney_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    network_mode: host
    depends_on:
      - nginx

volumes:
  n8n_data:
    name: almoney_n8n_data
  web_static:
    name: almoney_web_static

networks:
  almoney_network:
    driver: bridge
