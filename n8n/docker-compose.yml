services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5680:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=n8n.almoneytracker.live
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.almoneytracker.live/
      - N8N_EDITOR_BASE_URL=https://n8n.almoneytracker.live/
volumes:
  n8n_data:
